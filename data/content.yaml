  content: >
    OKAY TK is an award-winning DJ from Halifax, Nova Scotia, known amongst friends and peers for his personality, skill, and versatility. 
    With multiple competition wins, memorable DJ routines, and national stage appearances, TK has connected with listeners everywhere—from award shows and special events aired on national television and commercial radio to live tours, streaming, and sharing the stage alongside some of your favourite artists. 
    OKAY TK brings the right energy to every set, making him an ideal choice for any event looking to leave a lasting impression.
