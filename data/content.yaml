home:
  welcome: >
    Welcome to my official website. I go by <span class="font-bold">OKAY TK</span>. Maybe you don’t know me yet, and that’s alright—this space is all about connecting. 
    Here, you’ll find my music, videos, mixes, and event dates, all kept simple and to the point. Thanks for stopping by, and I hope you’ll get to know a bit more about me.
  about: >
    <span class="font-bold">OKAY TK</span> is an award-winning DJ from Halifax, Nova Scotia, known amongst friends and peers for his personality, skill, and versatility. 
    With multiple competition wins, memorable DJ routines, and national stage appearances, TK has connected with listeners everywhere—from award shows and special events aired on national television and commercial radio to live tours, streaming, and sharing the stage alongside some of your favourite artists. 
    <span class="font-bold">OKAY TK</span> brings the right energy to every set, making him an ideal choice for any event looking to leave a lasting impression.
