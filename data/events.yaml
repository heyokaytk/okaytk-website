  - name: "Bump & Grind - R&B Day Party"
    date: "August 17th, 2025"
    time: "4:00 PM - 8:00 PM"
    location:
      venue: "The Pint Halifax"
      venue_url: "https://www.thepinthfx.com/"
      ticket_url: "https://www.showpass.com/bumpandgrindsunday"
