    description: >
      Our next Day Party is officially locked in—and this time, we’re switching things up.

We’re bringing it to one of the best patios in downtown Halifax. Sunday, August 17th, we’re taking over The Pint’s rooftop patio for our first-ever Sunday Day Party.

Yup, Sunday—we’re testing the waters to see if Halifax is ready for that Sunday afternoon energy.

🗓️ Sunday, August 17th

⏰ 4PM - 8PM

📍 The Pint – Rooftop Patio (Downtown Halifax)

🎟️ Tickets are just $10 (plus fees) — on sale now!

⚠️ Note: This space is smaller than our last venue, so tickets are limited. If you’re thinking about coming, grab yours early before it sells out!
