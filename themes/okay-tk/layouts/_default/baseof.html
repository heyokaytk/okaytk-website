<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode }}" dir="{{ or site.Language.LanguageDirection `ltr` }}">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <header class="">
    {{ partial "header.html" . }}
  </header>
  <div class="mb-10 flex-grow">
    <main class="">
      {{ block "main" . }}{{ end }}
    </main>
    <footer class="bg-gray-800 text-white py-8">
      {{ partial "footer.html" . }}
    </footer>
  </div>
</body>
</html>
