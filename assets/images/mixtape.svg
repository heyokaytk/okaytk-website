<svg width="500" height="300" viewBox="0 0 500 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Cassette Body -->
  <rect x="10" y="10" width="480" height="280" fill="#000000" stroke="#333" stroke-width="10" rx="15" ry="15"/>

  <!-- Label Background -->
  <rect x="20" y="20" width="460" height="100" fill="#FFFFFF"/>
  
  <!-- Orange and Black Stripe -->
  <rect x="340" y="20" width="140" height="100" fill="#E86D1F"/>
  <text x="370" y="65" font-size="30" font-family="Arial" fill="#000000">C60</text>
  <text x="370" y="90" font-size="15" font-family="Arial" fill="#000000">LN</text>

  <!-- Side Label -->
  <rect x="30" y="40" width="30" height="30" fill="none" stroke="#000000" stroke-width="2"/>
  <text x="35" y="60" font-size="12" font-family="Arial" fill="#000000">SIDE</text>

  <!-- Label Lines -->
  <line x1="80" y1="30" x2="330" y2="30" stroke="#000000" stroke-width="2"/>
  <line x1="80" y1="50" x2="330" y2="50" stroke="#000000" stroke-width="2"/>
  <line x1="80" y1="70" x2="330" y2="70" stroke="#000000" stroke-width="2"/>
  
  <!-- Hi-Fi Low Noise Text -->
  <text x="30" y="100" font-size="10" font-family="Arial" fill="#000000">HI-FI</text>
  <text x="85" y="100" font-size="10" font-family="Arial" fill="#000000">LOW NOISE</text>

  <!-- Screw Holes -->
  <circle cx="50" cy="250" r="10" fill="#333"/>
  <circle cx="450" cy="250" r="10" fill="#333"/>

  <!-- Tape Reels -->
  <circle cx="150" cy="170" r="45" fill="none" stroke="#333" stroke-width="4"/>
  <circle cx="150" cy="170" r="20" fill="none" stroke="#333" stroke-width="4"/>
  <circle cx="350" cy="170" r="45" fill="none" stroke="#333" stroke-width="4"/>
  <circle cx="350" cy="170" r="20" fill="none" stroke="#333" stroke-width="4"/>

  <!-- Bottom Holes -->
  <rect x="100" y="260" width="20" height="10" fill="#333"/>
  <rect x="160" y="260" width="20" height="10" fill="#333"/>
  <rect x="220" y="260" width="60" height="10" fill="#333"/>
  <rect x="300" y="260" width="20" height="10" fill="#333"/>
  <rect x="360" y="260" width="20" height="10" fill="#333"/>

</svg>