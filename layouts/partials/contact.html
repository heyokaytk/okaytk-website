<h2 class="tk-contact-heading">GET IN TOUCH</h2>
<form action="#" method="POST" class="tk-contact-form">
  <input
    type="email"
    id="email"
    name="email"
    placeholder="Email address"
    required
  />
  <textarea
    id="message"
    name="message"
    rows="5"
    placeholder="Your message..."
    required
  ></textarea>
  <button type="submit" aria-label="Send Message">Send Message</button>
</form>
