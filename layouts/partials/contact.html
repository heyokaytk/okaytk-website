<section class="bg-gray-50 text-gray-800 py-16 px-6">
    <!-- Contact Section Header -->
    <div class="max-w-3xl mx-auto text-center mb-12">
        <h2 class="text-4xl font-bold">Get in Touch</h2>
        <p class="text-lg text-gray-600 mt-4">We're here to help! Reach out through our social media or send us a message directly.</p>
    </div>

    <!-- Contact Section Content -->
    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-12 items-start">
        <!-- Social Media Links -->
        <div class="space-y-6">
            <h3 class="text-2xl font-semibold text-gray-700 mb-4">Follow Us</h3>
            {{ range $social := site.Data.social_links }}
                <a href="{{ $social.url }}"
                   target="_blank"
                   rel="noopener noreferrer"
                   class="flex items-center space-x-4 transition duration-300 hover:text-blue-600"
                   aria-label="{{ $social.platform }}">
                    <!-- Icon -->
                    <span class="text-3xl">
                        <span class="iconify"
                              data-icon="{{ $social.icon | safeURL }}"
                              data-inline="false">
                        </span>
                    </span>
                    <!-- Social Platform Name -->
                    <span class="text-lg font-medium">{{ $social.platform }}</span>
                </a>
            {{ end }}
        </div>

        <!-- Contact Form -->
        <div class="bg-white p-8 rounded-lg shadow-md">
            <h3 class="text-2xl font-semibold text-gray-700 mb-6 text-center">Send Us a Message</h3>
            <form action="#" method="POST" class="space-y-6">
                <!-- Email Field -->
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500"
                        placeholder="your.email@example.com" 
                        required
                    />
                </div>
                <!-- Message Field -->
                <div>
                    <label for="message" class="block text-sm font-medium text-gray-700">Message</label>
                    <textarea 
                        id="message" 
                        name="message" 
                        rows="4" 
                        class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500"
                        placeholder="Your message..." 
                        required
                    ></textarea>
                </div>
                <!-- Submit Button -->
                <div>
                    <button 
                        type="submit" 
                        class="w-full bg-blue-600 text-white font-medium py-2 px-4 rounded-lg shadow hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
                    >
                        Send Message
                    </button>
                </div>
            </form>
        </div>
    </div>
</section>
