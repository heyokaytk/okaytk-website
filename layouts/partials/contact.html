<section class="bg-white text-gray-800 py-16 px-6">
    <!-- Contact Section Header -->
    <div class="max-w-3xl mx-auto text-center mb-12">
        <h2 class="text-4xl font-bold">Get in Touch</h2>
        <p class="text-lg text-gray-600 mt-4">We're here to help! Reach out through our social media or send us a message directly.</p>
    </div>

    <!-- Social Media Links in Rows -->
    <div class="flex flex-col items-center space-y-6 mb-12">
        {{ range $social := site.Data.social_links }}
            <a href="{{ $social.url }}"
               target="_blank"
               rel="noopener noreferrer"
               class="relative group flex items-center space-x-4 transition duration-300 {{ $social.color }}"
               aria-label="{{ $social.platform }}">
                <!-- Icon with hover effect -->
                <span class="text-3xl transform transition-transform duration-300 group-hover:scale-110">
                    <span class="iconify"
                          data-icon="{{ $social.icon | safeURL }}"
                          data-inline="false">
                    </span>
                </span>
                <!-- Social Platform Name -->
                <span class="text-lg font-semibold">{{ $social.platform }}</span>
            </a>
        {{ end }}
    </div>

    <!-- Additional Contact Information -->
    <div class="max-w-3xl mx-auto text-center">
        <h3 class="text-2xl font-semibold mb-4">Contact Information</h3>
        <p class="text-gray-600 text-lg">Email: <a href="mailto:contact@okaytk.com" class="text-blue-600 hover:text-blue-700">contact@okaytk.com</a></p>
        <p class="text-gray-600 text-lg mt-2">Phone: <a href="tel:+1234567890" class="text-blue-600 hover:text-blue-700">+1 (234) 567-890</a></p>
    </div>
</section>
