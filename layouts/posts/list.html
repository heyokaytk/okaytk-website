{{ define "main" }}
  <div class="container mx-auto px-4 py-8">
    <h1 class="text-4xl font-bold text-gray-800 mb-6">{{ .Title }}</h1>
    <div class="prose max-w-none mb-8">
      {{ .Content }}
    </div>
    <div class="space-y-6">
      {{ range .Pages }}
        <div class="p-4 border border-gray-200 rounded-lg hover:shadow-md transition-shadow duration-200">
          <h2 class="text-2xl font-semibold text-black hover:text-gray-700 transition-colors duration-200">
            <a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a>
          </h2>
        </div>
      {{ end }}
    </div>
  </div>
{{ end }}
